name: Build EXE

# Build the standalone Windows .exe and attach it to a GitHub Release.
# Trigger by pushing a version tag, e.g.:   git tag v1.1.0 && git push origin v1.1.0
# Or run manually from the Actions tab (produces a downloadable artifact).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyQt5 watchdog pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name KiCadLibraryManager --icon tools/app_icon.ico --add-data "tools/app_icon.ico;." --hidden-import watchdog.observers --hidden-import watchdog.events tools/LibraryManager.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: KiCadLibraryManager-exe
          path: dist/KiCadLibraryManager.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KiCadLibraryManager.exe
