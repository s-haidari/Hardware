name: Build EXE

# Build the standalone Windows .exe and attach it to a GitHub Release.
# Trigger by pushing a version tag, e.g.:   git tag v1.1.0 && git push origin v1.1.0
# Or run manually from the Actions tab (produces a downloadable artifact).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyQt5 watchdog pyinstaller cascadio trimesh numpy pillow

      - name: Build exe
        run: pyinstaller --onefile --windowed --name KiCadLibraryManager --icon tools/app_icon.ico --add-data "tools/app_icon.ico;." --add-data "tools/icon_sun.png;." --add-data "tools/icon_moon.png;." --add-data "tools/check_dark.png;." --add-data "tools/check_light.png;." --add-data "tools/caret_down.png;." --add-data "tools/caret_up.png;." --add-data "tools/fonts;fonts" --add-data "tools/lucide;lucide" --add-data "tools/cubemx_db;cubemx_db" --hidden-import PyQt5.QtSvg --hidden-import watchdog.observers --hidden-import watchdog.events --hidden-import kicad_tools --hidden-import nd_wizard --hidden-import nd_netclass_manager --hidden-import nd_project_settings_manager --hidden-import fp_render --hidden-import stm32_pins_tab --hidden-import stm32_db --hidden-import stm32_authority --hidden-import cascadio --collect-all trimesh --collect-all numpy --paths tools tools/LibraryManager.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: KiCadLibraryManager-exe
          path: dist/KiCadLibraryManager.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KiCadLibraryManager.exe
